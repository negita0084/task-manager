<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>タスク編集画面</title>
</head>

<body>

<h1>タスク編集画面</h1>

<form action="/task/edit" method="post">

    <input type="hidden" name="id" th:value="${task.id}">

    <button type="submit">保存</button>

    <h3>タスク詳細</h3>

    <div>
        タスク名<br>
        <input type="text" name="title" th:value="${task.title}">
    </div>

    <div>
        期限<br>
        <input type="text" name="deadline" th:value="${task.deadline}">
    </div>
	
	<div>
	    優先度<br>
	    <select name="priority">
	       <option value="緊急" th:selected="${task.priority == '緊急'}">緊急</option>
	       <option value="高" th:selected="${task.priority == '高'}">高</option>
	       <option value="中" th:selected="${task.priority == '中'}">中</option>
	       <option value="低" th:selected="${task.priority == '低'}">低</option>
	   	</select>
	</div>
    <div>
        進捗<br>
        <select name="progress">
            <option value="0%" th:selected="${task.progress == '0%'}">0%</option>
            <option value="25%" th:selected="${task.progress == '25%'}">25%</option>
            <option value="50%" th:selected="${task.progress == '50%'}">50%</option>
            <option value="75%" th:selected="${task.progress == '75%'}">75%</option>
            <option value="100%" th:selected="${task.progress == '100%'}">100%</option>
        </select>
    </div>

    <div>
        状態<br>
        <select name="status">
            <option value="未着手" th:selected="${task.status == '未着手'}">未着手</option>
            <option value="進行中" th:selected="${task.status == '進行中'}">進行中</option>
            <option value="完了" th:selected="${task.status == '完了'}">完了</option>
        </select>
    </div>

    <h3>タスク内容</h3>
    <textarea name="description" rows="10" cols="60"
              th:text="${task.description}"></textarea>

    <h3>メモ</h3>
    <textarea name="memo" rows="10" cols="60"
              th:text="${task.memo}"></textarea>

</form>

	<h3>サブタスク</h3>

	<!-- ① 追加フォーム -->
	<form th:action="@{/subtask/add}" method="post">
    	<input type="hidden" name="taskId" th:value="${task.id}">
    	<input type="text" name="title" placeholder="サブタスクを入力">
    	<button type="submit">＋追加</button>
	</form>

	<!-- ② 一覧 -->
	<div th:each="sub : ${task.subTasks}" class="subtask-row">

    <!-- 更新 -->
    <form th:action="@{/subtask/update}" method="post">
        <input type="hidden" name="id" th:value="${sub.id}">
        <input type="checkbox"
               name="done"
               th:checked="${sub.done}"
               onchange="this.form.submit()">
    </form>

    <span th:text="${sub.title}"></span>

    <!-- 削除 -->
    <form th:action="@{/subtask/delete}" method="post">
        <input type="hidden" name="id" th:value="${sub.id}">
        <button type="submit" class="delete-btn">削除</button>
    </form>

</div>
	
	<style>
		.subtask-row {
		    display: flex;
		    align-items: center;
		    gap: 8px;
		    margin-bottom: 5px;
		}

		.subtask-row form {
		    margin: 0;
		}

		.delete-btn {
		    font-size: 12px;
		    padding: 2px 8px;
		}
	</style>
	
	<div>
    	<a th:href="@{/task/detai/{id}(id=${task.id})}">
        	<button type="button">戻る</button>
    	</a>
	</div>

</body>
</html>
